edition = "2024"
style_edition = "2024"
max_width = 120

# Keep rustfmt's conservative expression heuristics instead of scaling them up
# with max_width. The wider limit is available for declarations, while nested
# calls and method chains still break into readable steps.
fn_call_width = 60
attr_fn_like_width = 70
struct_lit_width = 18
struct_variant_width = 35
array_width = 60
chain_width = 60
